name: Hello Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate terraform plan
        run: |
          echo "Running terraform plan..."
          echo "Plan complete - 3 resources to add, 0 to change, 0 to destroy"

      - name: Simulate a plan failure
        run: |
          echo "Error: failed to read provider configuration"
          exit 1

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate terraform apply
        run: |
          echo "Running terraform apply..."
          echo "Apply complete - 3 resources created"